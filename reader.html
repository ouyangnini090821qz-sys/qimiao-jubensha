清晨。

    const value = localStorage.getItem(key);
    if (value === null) return defaultValue;
    return JSON.parse(value);
  } catch {
    return defaultValue;
  }
}

/* 安全保存 */
function safeSet(key, data) {
  try {
    localStorage.setItem(
      key,
      typeof data === "string" ? data : JSON.stringify(data)
    );
  } catch (e) {
    console.log("储存失败");
  }
}

/* 获取章节列表 */
function getChapterList() {
  return Object.keys(chapters)
    .map(Number)
    .sort((a, b) => a - b);
}

/* 修复章节异常 */
if (!chapters[currentChapter]) {
  currentChapter = getChapterList()[0] || 1;
}

/* 清理旧滚动记录 */
function cleanScrollData() {
  const keys = Object.keys(localStorage);
  const scrollKeys = keys.filter(key => key.startsWith("scroll_"));

  if (scrollKeys.length > 100) {
    scrollKeys
      .slice(0, scrollKeys.length - 100)
      .forEach(key => localStorage.removeItem(key));
  }
}

/* 加载章节 */
function loadChapter() {
  if (!reader) return;

  const chapter = chapters[currentChapter] || "暂无内容";

const content = chapter
  .trim()
  .replace(/&/g, "&amp;")
  .replace(/</g, "&lt;")
  .replace(/>/g, "&gt;")
  .replace(/"/g, "&quot;")
  .replace(/'/g, "&#039;")
  .split(/\n\s*\n/)
  .map(p => `<p>${p.replace(/\n/g,"<br>")}</p>`)
  .join("");

  reader.style.opacity = "0";
  reader.scrollTop = 0;
  reader.replaceChildren();

  const title = document.createElement("div");
  title.style.fontSize = "28px";
  title.style.fontWeight = "bold";
  title.style.marginBottom = "25px";
  title.textContent = chapterNames[currentChapter] || `第${currentChapter}章`;

  const text = document.createElement("div");
  text.innerHTML = content;

  reader.append(title, text);

  safeSet("chapter", currentChapter);

  const chapterTitle = document.getElementById("chapterTitle");
  const chapterMeta = document.getElementById("chapterMeta");
  if (chapterTitle) chapterTitle.textContent = chapterNames[currentChapter] || `第${currentChapter}章`;
  if (chapterMeta) chapterMeta.textContent = `当前章节：${currentChapter} / ${getChapterList().length}`;

  requestAnimationFrame(() => {
    const savedTop = Number(safeGet(`scroll_${currentChapter}`, 0)) || 0;
    reader.scrollTop = savedTop;
    reader.style.opacity = "1";
  });

  cleanScrollData();
}

/* 下一章 */
function nextChapter() {
  if (pageLock) return;
  pageLock = true;

  const chapterList = getChapterList();
  const index = chapterList.indexOf(currentChapter);

  if (index < chapterList.length - 1) {
    currentChapter = chapterList[index + 1];
    safeSet("chapter", currentChapter);
    loadChapter();
  }

  setTimeout(() => {
    pageLock = false;
  }, 300);
}

/* 上一章 */
function prevChapter() {
  if (pageLock) return;
  pageLock = true;

  const chapterList = getChapterList();
  const index = chapterList.indexOf(currentChapter);

  if (index > 0) {
    currentChapter = chapterList[index - 1];
    safeSet("chapter", currentChapter);
    loadChapter();
  }

  setTimeout(() => {
    pageLock = false;
  }, 300);
}

/* 字体开关 */
function openFont() {
  if (fontMenu) {
    fontMenu.classList.toggle("show");
  }
}

/* 设置字体 */
function setFont(size) {
  document.documentElement.style.setProperty("--readerFont", size + "px");
  safeSet("font", String(size));

  if (fontMenu) {
    fontMenu.classList.remove("show");
  }
}

/* 收藏 */
function saveBook() {
  let list = safeGet("favorite", []);

  if (!Array.isArray(list)) {
    list = [];
  }

  if (!list.some(item => item.chapter === currentChapter)) {

    list.push({
      chapter: currentChapter,
      title: chapterNames[currentChapter] || `第${currentChapter}章`
    });

    list.sort((a, b) => a.chapter - b.chapter);

    safeSet("favorite", list);

    alert(`已收藏第${currentChapter}章 ❤️`);

  } else {

    alert("已收藏过");

  }
}

/* 评论 */
function commentBox() {
  const comment = prompt("输入评论");

  if (!comment || !comment.trim()) {
    return;
  }

  let comments = safeGet("comments", []);

  if (!Array.isArray(comments)) {
    comments = [];
  }

  comments.push({
    chapter: currentChapter,
    text: comment.trim(),
    time: Date.now()
  });

  if (comments.length > 100) {
    comments = comments.slice(-100);
  }

  safeSet("comments", comments);

  alert("评论成功💬");
}

/* 初始化 */
document.addEventListener("DOMContentLoaded", () => {

  reader = document.getElementById("reader");
  fontMenu = document.getElementById("fontMenu");
  const backBtn = document.getElementById("backBtn");

  if (!reader) return;

  const font = safeGet("font", 18);
  document.documentElement.style.setProperty("--readerFont", font + "px");

  loadChapter();

  /* 保存阅读进度 */
  let timer;

  reader.addEventListener("scroll", () => {
    clearTimeout(timer);

    timer = setTimeout(() => {
      safeSet(`scroll_${currentChapter}`, reader.scrollTop);
    }, 300);
  });

  /* 左右翻页 */
  let startX = 0;
  let startY = 0;

  reader.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, { passive: true });

  reader.addEventListener("touchend", e => {
    const endX = e.changedTouches[0].clientX;
    const endY = e.changedTouches[0].clientY;
    const moveX = endX - startX;
    const moveY = endY - startY;

    if (
      Math.abs(moveX) < 100 ||
      Math.abs(moveX) < Math.abs(moveY) * 1.5
    ) {
      return;
    }

    if (
      pageLock ||
      Math.abs(moveX) > window.innerWidth * 0.9
    ) {
      return;
    }

    if (moveX < 0) {
      nextChapter();
    } else {
      prevChapter();
    }
  }, { passive: true });

  /* 点击空白关闭字体菜单 */
  document.addEventListener("touchstart", e => {
    if (
      fontMenu &&
      !fontMenu.contains(e.target) &&
      !e.target.closest("#fontMenu") &&
      !e.target.closest(".tool-btn")
    ) {
      fontMenu.classList.remove("show");
    }
  }, { passive: true });

  /* 返回按钮 */
  if (backBtn) {
    backBtn.onclick = () => {
      location.href = "chapter-list.html";
    };
  }

});
</script>
