<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>德云小镇地图</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100%;}
body{
min-height:100dvh;
font-family:"PingFang SC",sans-serif;
color:white;
background:#07050d;
overflow-x:hidden;
overflow-y:auto;
padding:calc(10px + env(safe-area-inset-top)) 10px calc(18px + env(safe-area-inset-bottom));
}

.map-shell{
position:relative;
width:min(100%,980px);
margin:0 auto;
border-radius:28px;
padding:8px;
background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.03));
border:1px solid rgba(255,255,255,.16);
box-shadow:0 0 35px rgba(180,120,255,.28),inset 0 0 24px rgba(255,255,255,.04);
backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);
overflow:hidden;
}

.map-scroll{
width:100%;
overflow-x:auto;
overflow-y:hidden;
-webkit-overflow-scrolling:touch;
border-radius:22px;
}

.map{
position:relative;
width:900px;
height:1350px;
margin:0 auto;
border-radius:22px;
overflow:hidden;
background-image:url("https://i.postimg.cc/52H6kWtD/BA511468-F0CD-49D9-9B2B-7F20D4419A04.png");
background-size:100% 100%;
background-position:center;
background-repeat:no-repeat;
}

.back,
.music-btn{
position:absolute;
z-index:20;
width:58px;
height:58px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:28px;
cursor:pointer;
user-select:none;
background:rgba(120,80,180,.20);
border:1px solid rgba(255,255,255,.28);
backdrop-filter:blur(20px);
-webkit-backdrop-filter:blur(20px);
box-shadow:
0 0 18px rgba(205,160,255,.55),
inset 0 0 18px rgba(255,255,255,.10);
}

.back{left:26px;top:26px;}
.music-btn{right:26px;top:26px;}

.back:active,
.music-btn:active,
.place:active{
transform:scale(.94);
}

.place{
position:absolute;
z-index:10;
min-width:136px;
height:46px;
padding:0 18px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
gap:8px;
font-size:17px;
letter-spacing:1px;
white-space:nowrap;
color:#fff;
cursor:pointer;
user-select:none;

background:
linear-gradient(
180deg,
rgba(255,255,255,.24),
rgba(120,78,155,.58) 48%,
rgba(20,14,32,.78)
);

border:1px solid rgba(255,235,255,.40);

backdrop-filter:blur(18px);
-webkit-backdrop-filter:blur(18px);

box-shadow:
0 0 16px rgba(225,185,255,.50),
0 0 28px rgba(160,105,255,.22),
inset 0 1px 0 rgba(255,255,255,.34),
inset 0 0 18px rgba(255,255,255,.08);

transition:.22s;
}

.place::before,
.place::after{
content:"✦";
font-size:12px;
opacity:.85;
color:rgba(255,230,255,.95);
text-shadow:0 0 8px rgba(255,220,255,.9);
}

.place.open{
box-shadow:
0 0 18px rgba(255,220,170,.56),
0 0 32px rgba(200,145,255,.25),
inset 0 1px 0 rgba(255,255,255,.36),
inset 0 0 18px rgba(255,255,255,.10);
}

.place.lock{
opacity:.92;
}

.place.home{
background:
linear-gradient(180deg,rgba(210,220,255,.20),rgba(90,120,210,.30),rgba(20,20,45,.55));
box-shadow:
0 0 18px rgba(155,185,255,.48),
inset 0 0 18px rgba(255,255,255,.09);
}

.place.warm{
background:
linear-gradient(180deg,rgba(255,210,150,.22),rgba(210,120,55,.34),rgba(45,25,16,.58));
box-shadow:
0 0 22px rgba(255,170,85,.62),
inset 0 0 18px rgba(255,255,255,.10);
}

.place.cyan{
background:
linear-gradient(180deg,rgba(180,245,255,.22),rgba(70,180,195,.32),rgba(12,45,55,.58));
box-shadow:
0 0 22px rgba(125,230,240,.55),
inset 0 0 18px rgba(255,255,255,.10);
}

.lock-tag{
position:absolute;
right:-7px;
top:-7px;
width:23px;
height:23px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
background:rgba(70,70,105,.92);
border:1px solid rgba(255,255,255,.30);
box-shadow:0 0 10px rgba(170,185,255,.45);
}

/* 按图定位 */
.p-school{left:382px;top:258px;}
.p-sakura{left:382px;top:419px;}
.p-suqing{left:74px;top:462px;}
.p-fanfan{left:184px;top:321px;}
.p-park{left:660px;top:443px;}

.p-fruit{left:72px;top:713px;}
.p-center{left:374px;top:658px;min-width:155px;height:50px;font-size:18px;}

.p-hero{left:652px;top:627px;}
.p-yang{left:652px;top:696px;}
.p-girl{left:652px;top:768px;}

.p-ramen{left:80px;top:812px;}
.p-leftshop{left:88px;top:905px;}
.p-guchen{left:302px;top:905px;}
.p-bread{left:548px;top:905px;}

.p-hotel{left:360px;top:1069px;}
.p-cafe{left:330px;top:1257px;min-width:240px;height:58px;font-size:22px;}

.modal{
position:fixed;
inset:0;
display:none;
align-items:center;
justify-content:center;
padding:22px;
background:rgba(0,0,0,.58);
z-index:2000;
}

.modal.show{display:flex;}

.panel{
width:min(92vw,460px);
border-radius:28px;
padding:24px 20px;
background:linear-gradient(180deg,rgba(38,28,55,.94),rgba(16,12,26,.96));
border:1px solid rgba(255,255,255,.18);
backdrop-filter:blur(24px);
-webkit-backdrop-filter:blur(24px);
box-shadow:0 0 40px rgba(180,120,255,.35),inset 0 0 20px rgba(255,255,255,.05);
}

.panel-title{
font-size:26px;
font-weight:700;
margin-bottom:8px;
text-shadow:0 0 18px rgba(220,170,255,.45);
}

.panel-status{
display:inline-flex;
align-items:center;
margin-bottom:14px;
padding:5px 12px;
border-radius:999px;
font-size:12px;
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.13);
opacity:.92;
}

.panel-text{
font-size:15px;
line-height:1.9;
opacity:.86;
white-space:pre-line;
}

.panel-actions{
margin-top:22px;
display:flex;
gap:10px;
}

.panel-actions button{
flex:1;
height:46px;
border:none;
border-radius:16px;
font-size:15px;
color:white;
cursor:pointer;
}

.enter-btn{
background:linear-gradient(180deg,rgba(180,120,255,.95),rgba(95,56,190,.95));
box-shadow:0 0 18px rgba(180,120,255,.35),inset 0 1px 0 rgba(255,255,255,.18);
}

.close-btn{
background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.05));
border:1px solid rgba(255,255,255,.12)!important;
}

.panel-actions button:active{transform:scale(.96);}

@media(max-width:520px){
body{padding-left:6px;padding-right:6px;}
.map-shell{padding:6px;border-radius:22px;}
}
</style>
</head>

<body>

<div class="map-shell">
<div class="map-scroll">
<div class="map">

<div class="back" id="backBtn">←</div>
<button type="button" class="music-btn" id="musicBtn">🎵</button>

<div class="place open p-school" onclick="openPlace('school')">圣约学院</div>
<div class="place open p-sakura" onclick="openPlace('sakura')">樱花路</div>

<div class="place lock p-suqing" onclick="openPlace('suqing')">苏晴家<span class="lock-tag">锁</span></div>
<div class="place lock p-fanfan" onclick="openPlace('fanfan')">范菲菲家<span class="lock-tag">锁</span></div>
<div class="place lock p-park" onclick="openPlace('park')">游乐场<span class="lock-tag">锁</span></div>

<div class="place lock p-fruit" onclick="openPlace('fruit')">水果店<span class="lock-tag">锁</span></div>
<div class="place open p-center" onclick="openPlace('center')">中心水池</div>

<div class="place open home p-hero" onclick="openPlace('heroHome')">女主的家</div>
<div class="place lock home p-yang" onclick="openPlace('yangHome')">杨晨家<span class="lock-tag">锁</span></div>
<div class="place lock home p-girl" onclick="openPlace('girlHome')">小女孩家<span class="lock-tag">锁</span></div>

<div class="place lock p-ramen" onclick="openPlace('ramen')">拉面店<span class="lock-tag">锁</span></div>
<div class="place lock p-leftshop" onclick="openPlace('leftShop')">左小卖铺<span class="lock-tag">锁</span></div>
<div class="place lock cyan p-guchen" onclick="openPlace('guchenHome')">顾沉家<span class="lock-tag">锁</span></div>
<div class="place lock p-bread" onclick="openPlace('bread')">右面包店<span class="lock-tag">锁</span></div>

<div class="place lock p-hotel" onclick="openPlace('hotel')">玫瑰酒店<span class="lock-tag">锁</span></div>
<div class="place open warm p-cafe" onclick="openPlace('cafe')">好梦咖啡馆</div>

</div>
</div>
</div>

<div class="modal" id="modal">
<div class="panel">
<div class="panel-title" id="modalTitle">地点</div>
<div class="panel-status" id="modalStatus">状态</div>
<div class="panel-text" id="modalText">简介</div>
<div class="panel-actions">
<button class="close-btn" onclick="closeModal()">关闭</button>
<button class="enter-btn" id="enterBtn">进入</button>
</div>
</div>
</div>

<audio id="bgm" loop preload="none">
<source src="https://files.catbox.moe/g7id4x.mp3" type="audio/mpeg">
</audio>

<script>
const places={
school:{title:"圣约学院",status:"已开放 · 主线地点",chapter:1,text:`德云小镇北边的欧式维多利亚学院。

樱花盛开时看起来很梦幻，但校内的旧走廊、卫生间、舞蹈室和106储藏室，都藏着不正常的东西。`},

sakura:{title:"樱花路",status:"已开放 · 第一章路线",chapter:1,text:`圣约学院通往小镇中心的路。

第一章里，慕云曦在这里遇见拿着棒棒糖的小女孩。这里看似温柔，却是异常开始露出痕迹的地方。`},

suqing:{title:"苏晴家",status:"未开放 · 人物住宅",chapter:null,text:`靠近樱花路的住宅。

苏晴的生活区域暂未开放，但她和圣约学院、舞蹈室事件有直接关联。`},

fanfan:{title:"范菲菲家",status:"未开放 · 人物住宅",chapter:null,text:`位于樱花路偏左上方的住宅区。

这里不是普通支线地点。范菲菲的家庭背景、性格习惯和她在学校的姿态，之后都会和这里有关。`},

park:{title:"游乐场",status:"未开放 · 伏笔地点",chapter:null,text:`樱花路右侧的游乐场。

目前还没有正式开放。`},

fruit:{title:"水果店",status:"未开放 · 生活地点",chapter:null,text:`中心水池左侧的水果店。`},

center:{title:"中心水池",status:"已开放 · 小镇中心",chapter:null,text:`德云小镇的中心地标。

从这里可以前往住宅区、商业街、玫瑰酒店和好梦咖啡馆。它是小镇路线的核心交汇点。`},

heroHome:{title:"女主的家",status:"已开放 · 第一章起点",chapter:1,text:`慕云曦的家。

第一章从这里开始。浴室镜子里的异常、杨晨突然出现、早餐时的违和感，都发生在这里。`},

yangHome:{title:"杨晨家",status:"未开放 · 人物住宅",chapter:null,text:`杨晨的家。

他和慕云曦是竹马，所以家在同一片住宅区很合理。但他的温柔背后，明显不只是普通邻家哥哥。`},

girlHome:{title:"小女孩家",status:"未开放 · 人物住宅",chapter:null,text:`小女孩的家。

第一章里，她拿着棒棒糖出现在樱花路上。她看起来天真，但最后那个裂到耳根的笑，说明她绝不普通。`},

leftShop:{title:"小卖铺",status:"未开放 · 小镇商店",chapter:null,text:`中心水池往南的小卖铺。

暂未开放。以后可以作为买东西、听八卦、触发小镇支线的地点。`},

ramen:{title:"拉面店",status:"未开放 · 小镇餐馆",chapter:null,text:`商业街左侧的拉面店。

暂未开放。它的作用是让德云小镇更有生活感。(⁎⁍̴̛ᴗ⁍̴̛⁎)`},

bread:{title:"面包店",status:"未开放 · 小镇商店",chapter:null,text:`商业街右侧的面包店。

暂未开放。可以作为温暖日常地点。(⁎⁍̴̛ᴗ⁍̴̛⁎)`},

guchenHome:{title:"顾沉家",status:"未开放 · 人物住宅",chapter:null,text:`顾沉家。

他家为什么那么远？`},

hotel:{title:"玫瑰酒店",status:"未开放 · 后续地点",chapter:null,text:`德云小镇南边的玫瑰酒店。

外来的游客都喜欢住在玫瑰酒店。(⁎⁍̴̛ᴗ⁍̴̛⁎)`},

cafe:{title:"好梦咖啡馆",status:"已开放 · 第六章地点",chapter:6,text:`慕云曦爸爸经营的咖啡馆。

从圣约学院到这里约30分钟。表面温暖、安全、充满咖啡香，但后厨深处连接着不属于现实的无尽画廊。`}
};

const modal=document.getElementById("modal");
const modalTitle=document.getElementById("modalTitle");
const modalStatus=document.getElementById("modalStatus");
const modalText=document.getElementById("modalText");
const enterBtn=document.getElementById("enterBtn");

function openPlace(key){
const data=places[key];
if(!data)return;

modalTitle.textContent=data.title;
modalStatus.textContent=data.status;
modalText.textContent=data.text;

if(data.chapter){
enterBtn.textContent=`进入第 ${data.chapter} 章`;
enterBtn.onclick=()=>{
localStorage.setItem("chapter",data.chapter);
location.href="reader.html";
};
}else{
enterBtn.textContent="暂未开放";
enterBtn.onclick=()=>{
alert("这个地点还没开放，但已经存在于德云小镇。");
};
}

modal.classList.add("show");
}

function closeModal(){
modal.classList.remove("show");
}

modal.onclick=e=>{
if(e.target===modal)closeModal();
};

document.getElementById("backBtn").onclick=()=>{

location.href =
"index.html";

};

const musicBtn=document.getElementById("musicBtn");
const bgm=document.getElementById("bgm");

let playing = false;

localStorage.setItem(
"mapMusic",
"off"
);

musicBtn.onclick=()=>{
if(!playing){
bgm.play().catch(()=>{});
playing=true;
musicBtn.textContent="🔊";
localStorage.setItem("mapMusic","on");
}else{
bgm.pause();
playing=false;
musicBtn.textContent="🎵";
localStorage.setItem("mapMusic","off");
}
};
</script>

</body>
</html>
